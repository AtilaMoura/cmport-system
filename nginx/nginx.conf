# Redireciona HTTP → HTTPS
server {
    listen 80;
    server_name dash.zbielcodes.com.br;
    return 301 https://$host$request_uri;
}

# HTTPS
server {
    listen 443 ssl;
    server_name dash.zbielcodes.com.br;

    ssl_certificate     /etc/letsencrypt/live/dash.zbielcodes.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dash.zbielcodes.com.br/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Tamanho máximo de upload (importação de XMLs/ZIPs de notas)
    client_max_body_size 50M;

    # Proxy para o Next.js (frontend)
    location / {
        proxy_pass         http://frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Proxy direto para o FastAPI (evita duplo proxy Next.js → backend)
    location /api/v1/ {
        proxy_pass         http://backend:8000/api/v1/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        # Preserva o header Authorization (JWT)
        proxy_set_header   Authorization $http_authorization;
        proxy_pass_header  Authorization;
    }
}
