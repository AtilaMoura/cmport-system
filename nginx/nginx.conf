server {
    listen 80;
    server_name _;

    # Tamanho máximo de upload (importação de XMLs/ZIPs de notas)
    client_max_body_size 50M;

    # Proxy para o Next.js (frontend)
    location / {
        proxy_pass         http://frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Proxy direto para o FastAPI (evita duplo proxy Next.js → backend)
    location /api/v1/ {
        proxy_pass         http://backend:8000/api/v1/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        # Preserva o header Authorization (JWT)
        proxy_set_header   Authorization $http_authorization;
        proxy_pass_header  Authorization;
        # Sync Auvo/Inter pode levar até ~120s — padrão 60s causava 504
        proxy_read_timeout 180s;
        proxy_send_timeout 180s;
    }
}
