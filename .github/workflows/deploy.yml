name: Deploy CMPort

on:
  push:
    branches: [master]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detectar mudanças
        id: changes
        run: |
          BASE_SHA="${{ github.event.before }}"
          if [ -z "$BASE_SHA" ] || ! git cat-file -e "$BASE_SHA" 2>/dev/null; then
            BASE_SHA=$(git rev-parse HEAD~1)
          fi
          echo "backend=$(git diff --name-only $BASE_SHA HEAD | grep -q '^backend/' && echo true || echo false)" >> $GITHUB_OUTPUT
          echo "frontend=$(git diff --name-only $BASE_SHA HEAD | grep -q '^cmport-front/' && echo true || echo false)" >> $GITHUB_OUTPUT

      - name: Login no Docker Hub
        if: steps.changes.outputs.backend == 'true' || steps.changes.outputs.frontend == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Configurar Docker Buildx
        if: steps.changes.outputs.backend == 'true' || steps.changes.outputs.frontend == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Build e push — Backend (FastAPI)
        if: steps.changes.outputs.backend == 'true'
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/cmport-api:latest
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/cmport-api:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/cmport-api:buildcache,mode=max

      - name: Build e push — Frontend (Next.js)
        if: steps.changes.outputs.frontend == 'true'
        uses: docker/build-push-action@v5
        with:
          context: ./cmport-front
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/cmport-front:latest
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/cmport-front:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/cmport-front:buildcache,mode=max

      - name: Sincronizar arquivos de infra para VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "docker-compose.prod.yml,nginx/"
          target: /root/cmport-system/

      - name: Deploy na VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 30m
          envs: PULL_BACKEND,PULL_FRONTEND
          script: |
            cd /root/cmport-system
            [ "$PULL_BACKEND" = "true" ] && docker pull cmport/cmport-api:latest || echo "==> Backend sem mudancas, pulando pull"
            [ "$PULL_FRONTEND" = "true" ] && docker pull cmport/cmport-front:latest || echo "==> Frontend sem mudancas, pulando pull"
            docker compose -f docker-compose.prod.yml up -d
            docker image prune -f
            echo "==> Deploy concluido: $(date)"
            docker compose -f docker-compose.prod.yml ps
        env:
          PULL_BACKEND: ${{ steps.changes.outputs.backend }}
          PULL_FRONTEND: ${{ steps.changes.outputs.frontend }}
