name: Deploy CMPort

on:
  push:
    branches: [master]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Login no Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build e push — Backend (FastAPI)
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/cmport-api:latest
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/cmport-api:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/cmport-api:buildcache,mode=max

      - name: Build e push — Frontend (Next.js)
        uses: docker/build-push-action@v5
        with:
          context: ./cmport-front
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/cmport-front:latest
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/cmport-front:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/cmport-front:buildcache,mode=max

      - name: Sincronizar arquivos de infra para VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "docker-compose.prod.yml,nginx/"
          target: /root/cmport-system/

      - name: Deploy na VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 30m
          script: |
            cd /root/cmport-system
            docker pull cmport/cmport-api:latest
            docker pull cmport/cmport-front:latest
            docker compose -f docker-compose.prod.yml up -d
            docker image prune -f
            echo "==> Deploy concluído: $(date)"
            docker compose -f docker-compose.prod.yml ps
