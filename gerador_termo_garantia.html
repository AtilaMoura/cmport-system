<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Gerador – Termo de Garantia CMPORT</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', sans-serif;
    background: #c8ced8;
    display: flex;
    min-height: 100vh;
  }

  /* ====== SIDEBAR ====== */
  .sidebar {
    width: 360px;
    min-width: 360px;
    background: #18202f;
    color: #c8d0e0;
    padding: 22px 18px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    height: 100vh;
    position: sticky;
    top: 0;
  }
  .sidebar h1 { font-size: 0.88rem; font-weight: 700; color: #fff; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 2px; }
  .sub { font-size: 0.68rem; color: #556688; margin-bottom: 18px; }
  .sec { font-size: 0.6rem; text-transform: uppercase; letter-spacing: 0.1em; color: #3d5a99; font-weight: 700; margin-top: 16px; margin-bottom: 6px; padding-bottom: 3px; border-bottom: 1px solid #232d45; }
  label { display: block; font-size: 0.7rem; color: #8899bb; margin-bottom: 2px; margin-top: 8px; }
  input {
    width: 100%; background: #1e2840; border: 1px solid #2e3d5e; border-radius: 4px;
    color: #dde4f4; font-size: 0.8rem; padding: 6px 8px; outline: none; transition: border 0.15s; font-family: inherit;
  }
  input:focus { border-color: #3d6eee; background: #222e4a; }
  .r2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .btn-gen {
    margin-top: 20px; background: linear-gradient(135deg, #1e3fb0, #3d6eee);
    color: #fff; border: none; border-radius: 6px; padding: 11px;
    font-size: 0.84rem; font-weight: 700; cursor: pointer; text-transform: uppercase; letter-spacing: 0.04em;
  }
  .btn-gen:hover { opacity: 0.88; }
  .btn-pdf {
    margin-top: 7px; background: transparent; color: #556688; border: 1px solid #2e3d5e;
    border-radius: 6px; padding: 8px; font-size: 0.76rem; font-weight: 600; cursor: pointer;
  }
  .btn-pdf:hover { background: #1e2840; color: #99aabb; }

  /* ====== PREVIEW ====== */
  .preview {
    flex: 1; display: flex; flex-direction: column; align-items: center;
    padding: 32px 32px 60px; overflow-y: auto;
  }
  .prev-label {
    font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.1em;
    color: #7788aa; font-weight: 700; margin-bottom: 12px; align-self: flex-start;
  }

  /* ====== A4 DOCUMENT ====== */
  .doc {
    width: 794px;
    height: 1123px;
    position: relative;
    overflow: hidden;
    box-shadow: 0 8px 40px rgba(0,0,0,0.28);
    background: #fff;
    flex-shrink: 0;
  }

  /* Full-page timbrado - exact A4 size */
  .doc-bg {
    position: absolute;
    top: 0; left: 0;
    width: 794px;
    height: 1123px;
    object-fit: fill;
    z-index: 0;
    display: block;
  }

  /* All content above background */
  .doc-layer {
    position: absolute;
    top: 0; left: 0;
    width: 794px;
    height: 1123px;
    z-index: 1;
    pointer-events: none;
  }

  /* ── "CM PORT" bold label ──
     In timbrado: the word "CM PORT" already exists as part of the image.
     But in the docx, it's rendered as a text element overlaid.
     Position: left-aligned, below logo block, at ~y=183px in 794px scale */
  .doc-cmport {
    position: absolute;
    top: 157px;
    left: 32px;
    font-family: Calibri, 'Segoe UI', sans-serif;
    font-size: 9.5pt;
    font-weight: 900;
    color: #111;
    letter-spacing: 0.02em;
  }

  /* ── Body text starts here ──
     The timbrado image has the header baked in up to ~y=195px
     So body starts at 205px to clear the CM PORT label */
  .doc-body {
    position: absolute;
    top: 205px;
    left: 64px;
    right: 64px;
    font-family: Calibri, 'Segoe UI', sans-serif;
    font-size: 10.5pt;
    color: #111;
    line-height: 1.52;
  }

  .doc-date {
    font-style: italic;
    margin-bottom: 13px;
  }
  .doc-title {
    font-weight: 700;
    font-style: italic;
    font-size: 10.5pt;
    margin-bottom: 13px;
  }
  .doc-body p {
    font-style: italic;
    margin-bottom: 8px;
    text-align: justify;
  }
  .doc-body ul {
    margin: 4px 0 10px 42px;
    list-style: disc;
  }
  .doc-body ul li {
    font-style: italic;
    margin-bottom: 3px;
  }
  .sec-title {
    font-weight: 700;
    font-style: italic;
    display: block;
    margin-top: 11px;
    margin-bottom: 2px;
  }

  /* ── Signatures block ── */
  .doc-sigs {
    position: relative;
    text-align: center;
    font-family: Calibri, 'Segoe UI', sans-serif;
    font-style: italic;
    font-size: 10.5pt;
    line-height: 1.6;
    margin-top: 30px;
  }
  .doc-sigs img {
    display: block;
    margin: 0 auto -42px;
    width: 110px;
    opacity: 0.9;
    position: relative;
    z-index: 2;
  }

  @media print {
    body { background: #fff; }
    .sidebar { display: none; }
    .preview { padding: 0; background: #fff; }
    .prev-label { display: none; }
    .doc { box-shadow: none; }
    @page { size: A4; margin: 0; }
  }
</style>
</head>

    <div>
      <label>Término</label>

  </div>

  <div class="sec">Assinatura</div>
  <label>Empresa</label>
  <input id="empresa" value="CMPORT Sistemas de Eletrônicos de Segurança">
  <label>Responsável</label>

  <label>Cargo</label>
  <input id="cargo" value="Diretor Comercial">

  <button class="btn-gen" onclick="render()">⚡ Atualizar</button>
  <button class="btn-pdf" onclick="window.print()">🖨️ Imprimir / Salvar PDF</button>
</div>

function fS(d){if(!d)return'';const[y,m,dd]=d.split('-');return`${parseInt(dd)}/${m}/${y}`;}
function fL(d){if(!d)return'';const[y,m,dd]=d.split('-');return`${parseInt(dd)} de ${M[parseInt(m)-1]} de ${y}`;}
function g(id){return document.getElementById(id).value||'';}

function render(){
  const cidade=g('cidade'), dataDoc=g('dataDoc'),
    cliente=g('cliente'), end=g('endereco'),
    desc=g('desc'), dataExec=g('dataExec'),
    nf=g('nf'), os=g('os'), prazo=g('prazo'),
    gI=g('gI'), gF=g('gF'),
    empresa=g('empresa'), resp=g('resp'), cargo=g('cargo');

  document.getElementById('out-date').innerHTML=
    `<em>${cidade}, ${fL(dataDoc)}</em>`;

  document.getElementById('out-body').innerHTML=`
    <p><em><strong>Cliente:</strong> ${cliente}.<br>
    <strong>Endereço:</strong> ${end}.</em></p>

    <p>Pelo presente instrumento, formaliza-se o termo de garantia referente ao serviço
    prestado, consistente na <strong>${desc}</strong>, conforme abaixo descrito:</p>

    <ul>
      <li><strong>Data da execução do serviço:</strong> ${fS(dataExec)}</li>
      <li><strong>Nota Fiscal:</strong> nº ${nf}</li>
      <li><strong>Ordem de Serviço:</strong> nº ${os}</li>
    </ul>

    <span class="sec-title">Prazo de Garantia:</span>
    <p>A garantia concedida é de <strong>${prazo}</strong>, com início em ${fS(gI)} e término em ${fS(gF)}.</p>

    <span class="sec-title">Condições da Garantia:</span>
    <p>A presente garantia cobre exclusivamente defeitos decorrentes de falha de
    instalação ou do equipamento fornecido, dentro do prazo estabelecido.</p>

    <p>A garantia será automaticamente cancelada nas seguintes hipóteses:</p>
    <ul>
      <li>Intervenção, manutenção ou reparo realizado por pessoas não autorizadas;</li>
      <li>Danos decorrentes de acidentes, quedas ou agentes externos;</li>
      <li>Variações de tensão elétrica, sobrecargas ou instalações elétricas inadequadas;</li>
      <li>Uso indevido ou em desacordo com as recomendações técnicas;</li>
      <li>Qualquer ocorrência imprevisível ou de força maior que comprometa o funcionamento do equipamento.</li>
    </ul>

    <p>Sem mais, permanecemos à disposição para quaisquer esclarecimentos.</p>
    <p><em>Atenciosamente,</em></p>

    <div class="doc-sigs">
      <img src="data:image/png;base64,${SIG_B64}" alt="Assinatura">
      <em>${empresa}<br>${resp}<br>${cargo}</em>
    </div>
  `;

  document.getElementById('out-sigs').innerHTML='';
}

render();
document.querySelectorAll('input').forEach(el=>el.addEventListener('input',render));
</script>
